<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="300" height="150" viewBox="0 0 300 150">
  <defs>
    <filter id="blur1" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="6" result="blurred"/>
    </filter>
    <filter id="blur2" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.1" numOctaves="3" seed="5" result="noise2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise2" scale="10" xChannelSelector="R" yChannelSelector="G" result="displaced2"/>
      <feGaussianBlur in="displaced2" stdDeviation="8" result="blurred2"/>
    </filter>
  </defs>

  <ellipse cx="150" cy="75" rx="140" ry="90" fill="rgba(180, 240, 210, 0.3)" filter="url(#blur1)"/>
<ellipse cx="145" cy="72" rx="120" ry="75" fill="rgba(200, 255, 225, 0.3)" filter="url(#blur2)"/>
<ellipse cx="120" cy="65" rx="80" ry="52" fill="rgba(230, 255, 240, 0.3)" filter="url(#blur1)"/>
<ellipse cx="60" cy="75" rx="50" ry="60" fill="rgba(160, 230, 195, 0.3)" filter="url(#blur2)"/>
<ellipse cx="240" cy="72" rx="55" ry="57" fill="rgba(160, 230, 195, 0.3)" filter="url(#blur2)"/>
</svg>